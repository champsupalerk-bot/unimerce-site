<style>
/* =========================
   TOPBAR
========================= */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 18px 28px; /* ขนาดความสูงมาตรฐานดั้งเดิม ล็อกโครงสร้างเว็บไม่ให้พัง */
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px); /* รองรับ Safari */
  border-bottom: 1px solid #eee;
  z-index: 100;
  box-sizing: border-box;
}

/* ปุ่ม Home (ฝั่งซ้าย) */
.header-home-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  transition: opacity 0.2s ease;
  height: 20px; /* ปรับความสูงแสดงผลให้ออกมาเรียบหรู พอดีกับขนาดตัวอักษรโลโก้เดิม */
}

.header-home-link:hover {
  opacity: 0.5;
}

/* ตัวไอคอนรูปใหม่ที่ตัดขอบบนล่างแล้ว จะสเกลตัวเองได้อย่างสวยงาม */
.header-logo-icon {
  height: 100%; /* สูงเต็มพื้นที่ 20px ของตัวครอบ */
  width: auto;  /* ปล่อยความกว้างขยายออกด้านข้างตามสัดส่วนภาพจริง */
  display: block;
}

/* ปุ่ม Hamburger (ฝั่งขวา) */
.menu {
  width: 28px;
  height: 14px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
}

.menu span {
  height: 2px;
  background: #111;
  width: 100%;
  border-radius: 999px;
  transition: 0.3s;
}

/* =========================
   MENU DROPDOWN (Clean URLs)
========================= */
.menu-dropdown {
  position: fixed;
  top: 70px;
  right: 24px;
  width: 240px;
  background: rgba(255, 255, 255, 0.96);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid #eee;
  border-radius: 18px;
  padding: 14px;
  display: none;
  flex-direction: column;
  gap: 4px;
  z-index: 200;
  box-shadow: 0 18px 40px rgba(0,0,0,0.08);
}

.menu-dropdown.active {
  display: flex;
  animation: fadeDown 0.25s ease;
}

.menu-dropdown a {
  text-decoration: none;
  color: #111;
  font-size: 14px;
  padding: 12px 14px;
  border-radius: 12px;
  transition: 0.2s;
}

.menu-dropdown a:hover {
  background: #f5f5f5;
  transform: translateX(3px);
}

@keyframes fadeDown {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* =========================
   MOBILE RESPONSIVE
========================= */
@media(max-width:768px) {
  .topbar {
    padding: 18px 20px;
  }

  .menu-dropdown {
    width: calc(100% - 32px);
    right: 16px;
    top: 72px;
  }
}
</style>

<div class="topbar">

  <a class="header-home-link" href="/" title="Home">
    <img src="https://res.cloudinary.com/dzgaej1wo/image/upload/v1780633941/unimerce_home_btn_saceph.png" alt="UNIMERCE HOME" class="header-logo-icon" />
  </a>

  <div class="menu" id="menuBtn">
    <span></span>
    <span></span>
  </div>

</div>

<div class="menu-dropdown" id="menuDropdown">
  <a href="/">Home</a>
  <a href="/products">All Products</a>
  <a href="/inventory">Inventory</a>
  <a href="/water-purification">Water Purification</a>
  <a href="/aroma-systems">Aroma Systems</a>
</div>

<script>
(function() {
  const menuBtn = document.getElementById("menuBtn");
  const menuDropdown = document.getElementById("menuDropdown");

  if (menuBtn && menuDropdown) {
    menuBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      menuDropdown.classList.toggle("active");
    });

    window.addEventListener("click", (e) => {
      if (!menuBtn.contains(e.target) && !menuDropdown.contains(e.target)) {
        menuDropdown.classList.remove("active");
      }
    });
  }
})();
</script>
