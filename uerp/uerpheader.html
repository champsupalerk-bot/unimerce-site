<!-- Top Header -->
<header class="bg-white border-b border-google-border shadow-sm">
    <div class="max-w-[1000px] mx-auto px-4 h-14 flex items-center justify-between">

        <!-- Logo / System -->
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-lg bg-google-blue text-white flex items-center justify-center">
                <i class="fa-solid fa-cube"></i>
            </div>

            <div>
                <div class="text-sm font-bold text-slate-800">
                    UNIMERCE UERP
                </div>
                <div class="text-[11px] text-google-gray">
                    Internal Management System
                </div>
            </div>
        </div>

        <!-- Right Menu (Future) -->
        <div class="flex items-center gap-3 text-google-gray text-sm">

            <button class="hover:text-google-blue transition">
                <i class="fa-regular fa-bell"></i>
            </button>

            <button class="hover:text-google-blue transition">
                <i class="fa-regular fa-circle-user"></i>
            </button>

        </div>

    </div>
</header>

<!-- Chrome Style Navigation -->
<div class="bg-slate-200 pt-2 px-4 border-b border-google-border">

    <div class="max-w-[1000px] mx-auto flex items-end gap-1 overflow-x-auto no-scrollbar text-xs">

        <a href="index.html"
           data-page="index"
           class="chrome-tab px-4 py-2 flex items-center gap-2 border-t border-x border-transparent">

            <i class="fa-solid fa-chart-line"></i>
            <span>Dashboard</span>

        </a>

        <a href="sales.html"
           data-page="sales"
           class="chrome-tab px-4 py-2 flex items-center gap-2 border-t border-x border-transparent">

            <i class="fa-solid fa-receipt"></i>
            <span>Sales</span>

        </a>

        <a href="cogs.html"
           data-page="cogs"
           class="chrome-tab px-4 py-2 flex items-center gap-2 border-t border-x border-transparent">

            <i class="fa-solid fa-boxes-stacked"></i>
            <span>COGS</span>

        </a>

        <a href="test.html"
           data-page="test"
           class="chrome-tab px-4 py-2 flex items-center gap-2 border-t border-x border-transparent">

            <span>Test</span>

        </a>

</div>
