<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dzgaej1wo/image/upload/v1780903215/favicon.ico_vnm1uh.png" />

<title>UNIMERCE</title>

<style>
/* ===================================================
   TOPBAR & HEADER STYLES (Production-Ready)
=================================================== */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 18px 28px; /* ขนาดความสูงมาตรฐานดั้งเดิม ล็อกโครงสร้างเว็บไม่ให้พัง */
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px); /* รองรับ Safari */
  border-bottom: 1px solid #eee;
  z-index: 100;
  box-sizing: border-box;
}

/* ปุ่ม Home (ฝั่งซ้าย) - ล็อก Layout ป้องกันสเกลเพี้ยน */
.header-home-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  transition: opacity 0.2s ease;
  height: 16px; /* ปรับขนาดให้เล็กลงเรียบหรูตามบรีฟ */
}

.header-home-link:hover {
  opacity: 0.5;
}

/* ล็อกขนาดความสูงที่ตัวแท็กรูปภาพโดยตรง เพื่อป้องกันภาพแตก/พัง บนเซิร์ฟเวอร์จริง */
.header-logo-icon {
  height: 18px; /* บังคับความสูง 18px ตายตัวเพื่อความเสถียรบน Production */
  width: auto;  /* ปล่อยความกว้างคำนวณอัตโนมัติตามสัดส่วนไฟล์ภาพจริง */
  display: block;
}

/* ปุ่ม Hamburger (ฝั่งขวา) */
.menu {
  width: 28px;
  height: 14px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
}

.menu span {
  height: 2px;
  background: #111;
  width: 100%;
  border-radius: 999px;
  transition: 0.3s;
}

/* =========================
   MENU DROPDOWN (Clean URLs & Direct Links)
========================= */
.menu-dropdown {
  position: fixed;
  top: 70px;
  right: 24px;
  width: 280px;
  background: rgba(255, 255, 255, 0.96);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid #eee;
  border-radius: 18px;
  padding: 14px;
  display: none;
  flex-direction: column;
  gap: 4px;
  z-index: 200;
  box-shadow: 0 18px 40px rgba(0,0,0,0.08);
}

.menu-dropdown.active {
  display: flex;
  animation: fadeDown 0.25s ease;
}

.menu-dropdown a {
  text-decoration: none;
  color: #111;
  font-size: 14px;
  padding: 12px 14px;
  border-radius: 12px;
  transition: 0.2s;
}

.menu-dropdown a:hover {
  background: #f5f5f5;
  transform: translateX(3px);
}

/* เส้นคั่นแบ่งกลุ่มเมนูให้ดูเป็นระเบียบเรียบร้อย */
.menu-divider {
  height: 1px;
  background: #eee;
  margin: 6px 14px;
}

/* หัวข้อกลุ่มย่อยย่อยภายในเมนู */
.menu-section-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #888;
  padding: 6px 14px 2px;
  font-weight: 500;
}

/* ขยับย่อหน้าสำหรับรายการย่อยใน Category */
.menu-dropdown a.submenu-item {
  padding-left: 24px;
  font-size: 13.5px;
  color: #333;
}

@keyframes fadeDown {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* =========================
   MOBILE RESPONSIVE
========================= */
@media(max-width:768px) {
  .topbar {
    padding: 18px 20px;
  }

  .menu-dropdown {
    width: calc(100% - 32px);
    right: 16px;
    top: 72px;
  }
}
</style>
</head>
<body>

<div class="topbar">

  <a class="header-home-link" href="/" title="Home">
    <img src="https://res.cloudinary.com/dzgaej1wo/image/upload/v1780642657/unimerce_home_btn_320_omzc5g.png" alt="UNIMERCE HOME" class="header-logo-icon" />
  </a>

  <div class="menu" id="menuBtn">
    <span></span>
    <span></span>
  </div>

</div>

<div class="menu-dropdown" id="menuDropdown">
  <a href="/">Home</a>
  <a href="/inventory">Inventory</a>
  <a href="/products">All Products</a>
  
  <div class="menu-divider"></div>
  <div class="menu-section-title">Categories</div>
  
  <a href="vitev-premium-alkaline-water.html" class="submenu-item">Vitev Premium Alkaline Water</a>
  <a href="water-quality-tools.html" class="submenu-item">Water Quality Tools</a>
  <a href="#" class="submenu-item">Measurement Tools</a>
  <a href="/aroma-systems" class="submenu-item">Aroma Systems</a>
  
  <div class="menu-divider"></div>
  <a href="#contact" onclick="document.getElementById('menuDropdown').classList.remove('active');">Contact</a>
</div>

<script>
(function() {
  const menuBtn = document.getElementById("menuBtn");
  const menuDropdown = document.getElementById("menuDropdown");

  if (menuBtn && menuDropdown) {
    menuBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      menuDropdown.classList.toggle("active");
    });

    window.addEventListener("click", (e) => {
      if (!menuBtn.contains(e.target) && !menuDropdown.contains(e.target)) {
        menuDropdown.classList.remove("active");
      }
    });
  }

  // 🛠️ ส่วนแก้ไขเจาะจงจุด: ปรับให้อัปเดตตัวแปรชี้เป้าไปที่ไฟล์ใน GitHub นอกสุด เพื่อแก้ปัญหารูปหายใน Clean URL หน้าอื่น
  try {
    let faviconLink = document.querySelector("link[rel*='icon']");
    if (!faviconLink) {
        faviconLink = document.createElement('link');
        faviconLink.rel = 'icon';
        document.head.appendChild(faviconLink);
    }
    faviconLink.type = 'image/x-icon';
    faviconLink.href = '/favicon.ico?v=99';
  } catch(e) { console.error(e); }
})();
</script>

</body>
</html>
