<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UNIMERCE | Products</title>

<style>
/* =========================
   GLOBAL
========================= */
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#fafafa;
  color:#111;
  padding-top:40px;
}

/* =========================
   HEADER
========================= */
.header{
  max-width:1000px; /* ปรับลดจาก 1600px เหลือ 1000px เพื่อให้จัดวางตรงกลางแนวเดียวกับเนื้อหา */
  margin:auto;
  padding:24px 20px 10px;
}

.breadcrumb{
  font-size:12px;
  color:#888;
  margin-bottom:10px;
}

/* ลิงก์สำหรับกดกลับหน้า Home สไตล์เนียนๆ */
.breadcrumb a{
  color: #888;
  text-decoration: none;
  font-weight: bold;
}

.breadcrumb a:hover{
  text-decoration: underline;
  color: #2f5ea8;
}

.title{
  font-size:28px;
  font-weight:bold;
  letter-spacing:1px;
  margin-bottom: 16px;
}

/* SEARCHBAR แบบมินิมอลใต้หัวข้อหลัก */
.filterbar{
  max-width: 1000px;
  margin: 0 auto 15px auto;
  padding: 0 20px;
}

.filterbar input{
  width:100%;
  padding:10px 12px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:16px;
  outline:none;
  box-sizing:border-box;
  transition: all 0.2s ease;
}

.filterbar input:focus {
  border-color: #2f5ea8;
  box-shadow: 0 0 0 3px rgba(47, 94, 168, 0.15);
}

/* =========================
   CUSTOM CIRCULAR FILTER BAR
========================= */
.category-filter-bar {
  max-width: 1000px;
  margin: 0 auto 15px auto;
  padding: 0 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
}

.category-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  font-weight: 500;
  color: #444;
  cursor: pointer;
  user-select: none;
  position: relative;
}

/* ซ่อน Checkbox ดั้งเดิม */
.category-label input[type="checkbox"] {
  position: absolute;
  opacity: 0;
  cursor: pointer;
  height: 0;
  width: 0;
}

/* สร้างวงกลม Custom ออกแบบเลียนแบบ UI ทันสมัย */
.checkmark {
  height: 18px;
  width: 18px;
  background-color: #fff;
  border: 2px solid #ccc;
  border-radius: 50%;
  display: inline-block;
  position: relative;
  transition: all 0.2s ease;
}

/* เมื่อ Hover ปุ่ม */
.category-label:hover input ~ .checkmark {
  border-color: #2f5ea8;
}

/* เมื่อ Checkbox ถูกเลือก เปลี่ยนสีกรอบและพื้นหลัง */
.category-label input:checked ~ .checkmark {
  background-color: #2f5ea8;
  border-color: #2f5ea8;
}

/* จุดกลมตรงกลางสีขาวตอนแอคทีฟ */
.checkmark:after {
  content: "";
  position: absolute;
  display: none;
  top: 5px;
  left: 5px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: white;
}

.category-label input:checked ~ .checkmark:after {
  display: block;
}

/* =========================
   PAGINATION NAVIGATION BAR
========================= */
.pagination-bar {
  max-width: 1000px;
  margin: 30px auto 10px auto;
  padding: 0 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.page-btn {
  background: #fff;
  color: #333;
  border: 1px solid #ddd;
  padding: 8px 14px;
  font-size: 14px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  user-select: none;
  transition: all 0.2s ease;
}

.page-btn:hover {
  background: #f0f0f0;
  border-color: #bbb;
}

.page-btn.active {
  background: #2f5ea8;
  color: #fff;
  border-color: #2f5ea8;
}

.page-btn:disabled {
  background: #f5f5f5;
  color: #ccc;
  border-color: #eaeaea;
  cursor: not-allowed;
}

/* =========================
   GRID
========================= */
.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4, minmax(0, 1fr));
  gap:22px;
  align-items:start;
}

/* =========================
   PROMOTION CARD
========================= */
.promo-card{
  background: linear-gradient(135deg, #3a5a40, #344e41);
  color:#fff;
  border-radius:18px;
  padding:18px;
  min-height:280px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

.promo-card{
  width:100%;
  box-sizing:border-box;
  break-inside: avoid;
  -webkit-column-break-inside: avoid;
  display:inline-block;
}

.promo-tag{
  font-size:11px;
  letter-spacing:2px;
  opacity:0.7;
  margin-bottom:14px;
}

.promo-title{
  font-size:20px;
  font-weight:700;
  line-height:1.15;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
  word-break:break-word;
  margin-bottom:12px;
}

.promo-desc{
  font-size:13px;
  line-height:1.7;
  opacity:0.8;
}

/* =========================
   CARD (FINAL FIXED)
========================= */
.card{
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 4px 14px rgba(0,0,0,0.06);
  border:1px solid #eee;
  transition:0.2s ease;
  width:100%;
  max-width:280px;
  justify-self:center;
  box-sizing:border-box;
  cursor:pointer; /* เพิ่มรูปมือเพื่อให้รู้ว่าคลิกเปิดหน้ารายละเอียดได้ */
}

/* hover */
.card:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 24px rgba(0,0,0,0.10);
}

/* image */
.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  display:block;
  background:#f3f3f3;
}

.card .content{
  padding:12px;
  box-sizing:border-box;
}

.content{
  padding:14px;
}

/* =========================
   TOP INFO GRID
========================= */
.top-info{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  margin-bottom:8px;
  gap:10px;
}

.sku{
  font-size:14px;
  font-weight:600;
  color:#111;
}

.category{
  font-size:11px;
  color:#888;
  text-align:right;
}

/* =========================
   PRODUCT INFO
========================= */
.name{
  font-size:15px;
  font-weight:600;
  line-height:1.5;
  margin-bottom:12px;
  min-height:44px;
}

/* =========================
   PRICE + STOCK GRID
========================= */
.bottom-row{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:end;
  gap:10px;
}

.price-box{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.price-old{
  font-size:13px;
  color:#999;
  text-decoration:line-through;
}

.price-new{
  font-size:22px;
  font-weight:700;
  color:#111;
  line-height:1;
}

.stock-box{
  text-align:right;
}

.stock-label{
  font-size:11px;
  color:#999;
  margin-bottom:2px;
}

.stock-value{
  font-size:16px;
  font-weight:600;
  color:#111;
}

/* =========================
   LOADING
========================= */
.loading{
  text-align:center;
  color:#888;
  padding:40px;
  grid-column:1/-1;
}

/* =========================
   MOBILE
========================= */
@media(max-width:768px){

  .container{
    padding:12px;
  }

  .grid{
    column-count:2;
    column-gap:6px;
    display:block;
  }

  .card,
  .promo-card{
    break-inside: avoid;
    margin-bottom:3px;
    display:inline-block;
    width:100%;
  }

  .promo-card{
   min-height:140px;
   border-radius:16px;
   padding:14px;
  }

  .promo-title{
    font-size:18px;
    line-height:1.15;
    margin-bottom:8px;
  }

  .promo-desc{
    font-size:11px;
    line-height:1.5;
  }

  .promo-tag{
    font-size:10px;
    margin-bottom:10px;
  }

  .content{
    padding:12px;
  }

  .name{
    font-size:13px;
    min-height:auto;
  }

  .price-new{
    font-size:18px;
  }

  .sku{
    font-size:13px;
  }

  .stock-value{
    font-size:14px;
  }

  .title{
    font-size:24px;
  }

}

@media(min-width:1024px){

  .name{
    font-weight:500;
    letter-spacing:0.2px;
  }

  .price-new{
    font-weight:600;
  }

  .title{
    font-weight:700;
  }

  body{
    font-weight:400;
  }

}
</style>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-7LRV59ZF3R"></script>
<script src="/analytics.js"></script>

</head>

<body>

<div id="header-placeholder"></div>

<div class="header">

  <div class="breadcrumb">
    <a href="/">HOME</a> / PRODUCTS
  </div>

  <div class="title">
    All Products
  </div>

</div>

<div class="filterbar">
  <input id="searchBox" type="text" placeholder="Search Item Code / Description..." />
</div>

<div class="category-filter-bar">
  <label class="category-label">
    <input type="checkbox" class="cat-checkbox" value="WaterPurification" />
    <span class="checkmark"></span> กรองน้ำ
  </label>
  <label class="category-label">
    <input type="checkbox" class="cat-checkbox" value="WaterQualityTools" />
    <span class="checkmark"></span> วัดค่าน้ำ
  </label>
  <label class="category-label">
    <input type="checkbox" class="cat-checkbox" value="MeasurementTools" />
    <span class="checkmark"></span> วัดค่าทั่วไป
  </label>
  <label class="category-label">
    <input type="checkbox" class="cat-checkbox" value="AromaSystems" />
    <span class="checkmark"></span> อโรม่า
  </label>
</div>

<div class="container">

  <div id="product-grid" class="grid">

    <div class="loading">
      Loading products...
    </div>

  </div>

</div>

<div id="pagination-controls" class="pagination-bar"></div>

<script>

/* =========================
   LOAD HEADER
========================= */
fetch("header.html")
  .then(res => res.text())
  .then(data => {

    document.getElementById("header-placeholder").innerHTML = data;

    const menuBtn = document.getElementById("menuBtn");
    const menuDropdown = document.getElementById("menuDropdown");

    if(menuBtn && menuDropdown){

      menuBtn.addEventListener("click", () => {
        menuDropdown.classList.toggle("active");
      });

      window.addEventListener("click", (e) => {

        if(
          !menuBtn.contains(e.target) &&
          !menuDropdown.contains(e.target)
        ){
          menuDropdown.classList.remove("active");
        }

      });

    }

  });

/* =========================
   LOAD FOOTER
========================= */
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.body.insertAdjacentHTML("beforeend", data);
  });

// ปลอดภัยสูง: ย้ายมาเชื่อมต่อผ่านเซิร์ฟเวอร์ระบบ API Gateway ตัวใหม่โดยตรง
const API = "https://script.google.com/macros/s/AKfycby0BIQMiM7mEoQrckKXXSYZAudz3sJDsEr87IT8hktGk8oXc4wqC4bbV8LusoVXufXKvQ/exec";

let rawProducts = [];
let filtered    = [];
let currentPage = 1;
const itemsPerPage = 25;

// ฟังก์ชันล้าง format คอมมาเพื่อจัดเรียงและการคำนวณตัวเลขสต็อกสินค้าได้อย่างแม่นยำ
function cleanNumber(val) {
  if (val === null || val === undefined) return 0;
  if (typeof val === 'number') return val;
  let str = String(val).replace(/,/g, '').trim();
  if (str === "" || str === "-") return 0;
  let parsed = parseFloat(str);
  return isNaN(parsed) ? 0 : parsed;
}

async function loadProducts(){
  try {
    const res = await fetch(API, { method: "GET", mode: "cors", redirect: "follow" });
    const jsonResult = await res.json();
    
    if(jsonResult.status === "success") {
       rawProducts = jsonResult.data;
    } else {
       throw new Error(jsonResult.message);
    }

    /* =========================
       FILTER DISCONTINUED
    ========================= */
    filtered = rawProducts.filter(p => {
      const status = String(p.StockStatus || "").trim().toLowerCase();
      return status !== "discontinued";
    });

    processAndRender();

  } catch(e) {
    document.getElementById("product-grid").innerHTML =
      '<div class="loading">Failed to secure product master data.</div>';
  }
}

/* =========================
   PROMOTION CARD
========================= */
const promoCard = `
  <div class="promo-card">
    <div class="promo-tag">
      UNIMERCE SYSTEM
    </div>
    <div class="promo-title">
      Essential<br>
      Product<br>
      Collection
    </div>
  </div>
`;

/* =========================
   GLOBAL STATE FOR FILTER & PAGINATION & SEARCH
========================= */
function processAndRender() {
  const q = document.getElementById("searchBox").value.toLowerCase().trim();
  const checkedCategories = Array.from(document.querySelectorAll('.cat-checkbox:checked')).map(cb => cb.value);
  
  let targetProducts = filtered;
  
  // 1. FILTER BY MAIN CATEGORY
  if (checkedCategories.length > 0) {
    targetProducts = targetProducts.filter(p => {
      const cat = String(p.MainCategory || "").trim();
      return checkedCategories.includes(cat);
    });
  }

  // 2. FILTER BY SEARCH KEYWORD
  if (q) {
    targetProducts = targetProducts.filter(p => 
      String(p.Item_Code   || "").toLowerCase().includes(q) ||
      String(p.Description || "").toLowerCase().includes(q)
    );
  }

  // 3. CALC PAGINATION
  const totalItems = targetProducts.length;
  const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
  
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;

  const startIndex = (currentPage - 1) * itemsPerPage;
  const endIndex = startIndex + itemsPerPage;
  const paginatedProducts = targetProducts.slice(startIndex, endIndex);

  /* =========================
       PRODUCT RENDER
  ========================= */
  const grid = document.getElementById("product-grid");
  
  if(paginatedProducts.length === 0) {
    grid.innerHTML = '<div class="loading">No products found matching your criteria.</div>';
    renderPaginationControls(1);
    return;
  }

  const productCards = paginatedProducts.map(p => {
    const img = (p.image_link01 || "").trim();
    const sku = p.Item_Code || '-';
    const category = p.MainCategory || '-';
    
    let onhand = p.OnHand || '0';
    if(onhand !== "-") {
      onhand = cleanNumber(onhand).toLocaleString();
    }

    // มีการผูกเหตุการณ์ onclick ให้เปิดหน้าต่างรายละเอียดสินค้าแบบระบุ parameter โค้ดสินค้า
    return `
      <div class="card" onclick="window.location.href='/productdetail.html?code=${encodeURIComponent(sku.trim())}'">
        <img 
          src="${img}"
          onerror="this.src='https://via.placeholder.com/600x600?text=No+Image'"
        />
        <div class="content">
          <div class="top-info">
            <div class="sku">
              ${sku}
            </div>
            <div class="category">
              ${category}
            </div>
          </div>

          <div class="name">
            ${p.Description || '-'}
          </div>

          <div class="bottom-row">
            <div class="price-box">
              <div class="price-old">
                ${p.ListPrice ? '฿' + p.ListPrice : ''}
              </div>
              <div class="price-new">
                ${p.PromotionPrice ? '฿' + p.PromotionPrice : '-'}
              </div>
            </div>
            <div class="stock-box">
              <div class="stock-label">
                คงเหลือ
              </div>
              <div class="stock-value">
                ${onhand}
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  /* =========================
       FINAL RENDER
  ========================= */
  grid.innerHTML = (currentPage === 1 && !q && checkedCategories.length === 0 ? promoCard : "") + productCards;
  
  renderPaginationControls(totalPages);
}

function renderPaginationControls(totalPages) {
  const container = document.getElementById("pagination-controls");
  if (!container) return;

  if (totalPages <= 1) {
    container.innerHTML = "";
    return;
  }

  let html = ``;
  
  // ปุ่มก่อนหน้า (<)
  html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">ก่อนหน้า</button>`;

  // แสดงหมายเลขลำดับหน้าทั้งหมด 1, 2, 3, ... n
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="page-btn ${currentPage === i ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
  }

  // ปุ่มถัดไป (>)
  html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">ถัดไป</button>`;

  container.innerHTML = html;
}

// ฟังก์ชันเปลี่ยนหน้าและสั่งเลื่อนหน้าจอกลับขึ้นไปด้านบนอย่างนุ่มนวล
window.changePage = function(page) {
  currentPage = page;
  processAndRender();
  window.scrollTo({ top: 0, behavior: "smooth" });
};

/* =========================
   INIT EVENTS
========================= */
window.addEventListener("load", () => {
  // ดักจับสัญญาณการกรองคำค้นหา
  document.getElementById("searchBox").addEventListener("input", () => {
    currentPage = 1;
    processAndRender();
  });

  // ผูกตัวดักจับเหตุการณ์การเลือก Checkbox คัดกรองหมวดหมู่สินค้า
  document.querySelectorAll('.cat-checkbox').forEach(cb => {
    cb.addEventListener('change', () => {
      currentPage = 1; 
      processAndRender();
    });
  });

  loadProducts();
});

</script>

</body>
</html>
