<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UNIMERCE | Products</title>

<style>
/* =========================
   GLOBAL
========================= */
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#fafafa;
  color:#111;
  padding-top:70px;
}

/* =========================
   TOP BAR
========================= */
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:18px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #eee;
  z-index:100;
}

.logo{
  font-size:12px;
  letter-spacing:3px;
  color:#111;
  text-decoration:none;
}

.menu{
  width:28px;
  height:14px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  cursor:pointer;
}

.menu span{
  height:2px;
  background:#111;
  width:100%;
  border-radius:999px;
}

/* =========================
   HEADER
========================= */
.header{
  max-width:1600px;
  margin:auto;
  padding:24px 20px 10px;
}

.breadcrumb{
  font-size:12px;
  color:#888;
  margin-bottom:10px;
}

.title{
  font-size:28px;
  font-weight:bold;
  letter-spacing:1px;
}

/* =========================
   GRID
========================= */
.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4, minmax(0, 1fr));
  gap:22px;
  align-items:start;
}

/* =========================
   PROMOTION CARD
========================= */
.promo-card{
  background: linear-gradient(135deg, #3a5a40, #344e41);
  color:#fff;
  border-radius:18px;
  padding:18px;
  min-height:280px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

/* ✅ ADD THIS PART (สำคัญ) */
.promo-card{
  width:100%;
  box-sizing:border-box;
  break-inside: avoid;
  -webkit-column-break-inside: avoid;
  display:inline-block;
}

.promo-tag{
  font-size:11px;
  letter-spacing:2px;
  opacity:0.7;
  margin-bottom:14px;
}

.promo-title{
  font-size:20px;
  font-weight:700;
  line-height:1.15;

  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;

  word-break:break-word;
  margin-bottom:12px;
}

.promo-desc{
  font-size:13px;
  line-height:1.7;
  opacity:0.8;
}

/* =========================
   CARD (FINAL FIXED)
========================= */
.card{
  background:#fff;
  border-radius:16px;

  overflow:hidden;

  box-shadow:0 4px 14px rgba(0,0,0,0.06);
  border:1px solid #eee;

  transition:0.2s ease;

  /* IMPORTANT: กัน card ยืดผิดจังหวะ */
  width:100%;
  max-width:280px;
  justify-self:center;

  box-sizing:border-box;
}

/* hover */
.card:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 24px rgba(0,0,0,0.10);
}

/* image */
.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  display:block;
  background:#f3f3f3;
}

/* optional: content spacing safety (กัน layout เพี้ยน) */
.card .content{
  padding:12px;
  box-sizing:border-box;
}

.content{
  padding:14px;
}

/* =========================
   TOP INFO GRID
========================= */
.top-info{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  margin-bottom:8px;
  gap:10px;
}

.sku{
  font-size:14px;
  font-weight:600;
  color:#111;
}

.category{
  font-size:11px;
  color:#888;
  text-align:right;
}

/* =========================
   PRODUCT INFO
========================= */
.name{
  font-size:15px;
  font-weight:600;
  line-height:1.5;
  margin-bottom:12px;
  min-height:44px;
}

/* =========================
   PRICE + STOCK GRID
========================= */
.bottom-row{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:end;
  gap:10px;
}

.price-box{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.price-old{
  font-size:13px;
  color:#999;
  text-decoration:line-through;
}

.price-new{
  font-size:22px;
  font-weight:700;
  color:#111;
  line-height:1;
}

.stock-box{
  text-align:right;
}

.stock-label{
  font-size:11px;
  color:#999;
  margin-bottom:2px;
}

.stock-value{
  font-size:16px;
  font-weight:600;
  color:#111;
}

/* =========================
   LOADING
========================= */
.loading{
  text-align:center;
  color:#888;
  padding:40px;
  grid-column:1/-1;
}

/* =========================
   MOBILE
========================= */
@media(max-width:768px){

  .container{
    padding:12px;
  }

  /* masonry mobile layout */
  .grid{
    column-count:2;
    column-gap:6px;
    display:block;
  }

  
  .card,
  .promo-card{
    break-inside: avoid;
    margin-bottom:3px;
    display:inline-block;
    width:100%;
  }

  /* promo card only */
  .promo-card{
   min-height:140px;
   border-radius:16px;
   padding:14px;
  }

  .promo-title{
    font-size:18px;
    line-height:1.15;
    margin-bottom:8px;
  }

  .promo-desc{
    font-size:11px;
    line-height:1.5;
  }

  .promo-tag{
    font-size:10px;
    margin-bottom:10px;
  }

  .content{
    padding:12px;
  }

  .name{
    font-size:13px;
    min-height:auto;
  }

  .price-new{
    font-size:18px;
  }

  .sku{
    font-size:13px;
  }

  .stock-value{
    font-size:14px;
  }

  .title{
    font-size:24px;
  }

}

@media(min-width:1024px){

  .name{
    font-weight:500;
    letter-spacing:0.2px;
  }

  .price-new{
    font-weight:600;
  }

  .title{
    font-weight:700;
  }

  body{
    font-weight:400;
  }

}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

  <a class="logo" href="index.html">
    UNIMERCE
  </a>

  <div class="menu">
    <span></span>
    <span></span>
  </div>

</div>

<!-- HEADER -->
<div class="header">

  <div class="breadcrumb">
    Home / Products
  </div>

  <div class="title">
    All Products
  </div>

</div>

<!-- GRID -->
<div class="container">

  <div id="product-grid" class="grid">

    <div class="loading">
      Loading products...
    </div>

  </div>

</div>

<script>

async function loadProducts(){

  const res = await fetch(
    "https://opensheet.elk.sh/1OMMHGc9nfZKtFox1uNz0rZ_7oD-Imi97EPeN9lsMyLU/Item_Master"
  );

  const data = await res.json();

  const grid = document.getElementById("product-grid");

/* =========================
   FILTER STOCK STATUS
========================= */

const filtered = data.filter(p => {

  const status = String(p.StockStatus || "")
    .trim()
    .toLowerCase();

  return status !== "discontinued";

});

/* =========================
   PROMOTION CARD
========================= */

const promoCard = `

  <div class="promo-card">

    <div class="promo-tag">
      UNIMERCE SYSTEM
    </div>

    <div class="promo-title">
      Essential<br>
      Product<br>
      Collection
    </div>

  </div>

`;

/* =========================
   PRODUCT RENDER
========================= */

const productCards = filtered.map(p => {

  const img = (p.image_link01 || "").trim();

  const sku = p.Item_Code || '-';

  const category = p.MainCategory || '-';

  const onhand = p.OnHand || '0';

  return `

    <div class="card">

      <img 
        src="${img}"
        onerror="this.src='https://via.placeholder.com/600x600?text=No+Image'"
      />

      <div class="content">

        <!-- TOP INFO -->
        <div class="top-info">

          <div class="sku">
            ${sku}
          </div>

          <div class="category">
            ${category}
          </div>

        </div>

        <!-- PRODUCT NAME -->
        <div class="name">
          ${p.Description || '-'}
        </div>

        <!-- PRICE + STOCK -->
        <div class="bottom-row">

          <div class="price-box">

            <div class="price-old">
              ${p.ListPrice ? '฿' + p.ListPrice : ''}
            </div>

            <div class="price-new">
              ${p.PromotionPrice ? '฿' + p.PromotionPrice : '-'}
            </div>

          </div>

          <div class="stock-box">

            <div class="stock-label">
              คงเหลือ
            </div>

            <div class="stock-value">
              ${onhand}
            </div>

          </div>

        </div>

      </div>

    </div>

  `;

}).join('');

/* =========================
   FINAL RENDER
========================= */

grid.innerHTML = promoCard + productCards;

}

loadProducts();

</script>

</body>
</html>
