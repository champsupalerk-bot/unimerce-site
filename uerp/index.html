<!-- ===== START HEAD001 ===== -->
    <!-- Script External Header Load Tracker -->
    <script>
        // ระบบ Dynamic Component Loading สำหรับ U-ERP Header และ Layout Behavior
        async function loadUerpHeader() {
            // ระบุ Path เจาะจงเข้าโฟลเดอร์ระบบ /uerp/ เพื่อให้เบราว์เซอร์วิ่งหาจาก Root โดเมนได้แม่นยำ 100%
            const headerPath = '/uerp/uerpheader.html';
            const scriptPath = '/uerp/layoutuerp.js';
            
            const container = document.getElementById('uerp-header-container');

            if (!container) {
                console.error("Error: Element #uerp-header-container not found in DOM.");
                return;
            }

            try {
                console.log(`Loading header: ${headerPath}`);
                
                const res = await fetch(headerPath);
                console.log(`Header status: ${res.status}`);

                if (!res.ok) {
                    throw new Error(`Header not found: ${res.status}`);
                }

                const html = await res.text();
                container.innerHTML = html;
                console.log("UERP Header Loaded");

                // ดำเนินการ dynamically load layoutuerp.js หลังจากแทรก HTML สำเร็จ
                const script = document.createElement('script');
                script.src = scriptPath;
                script.type = 'text/javascript';

                script.onload = () => {
                    console.log("layoutuerp.js loaded");
                    if (typeof initUerpLayout === 'function') {
                        initUerpLayout();
                    } else {
                        console.error("Error: initUerpLayout() is not defined in layoutuerp.js");
                    }
                };

                script.onerror = () => {
                    console.error(`Error: Failed to load script from path: ${scriptPath}`);
                };

                document.body.appendChild(script);

            } catch (e) {
                console.error(`UERP HEADER ERROR:`, e);
            }
        }

        // เริ่มต้นการโหลด Component
        loadUerpHeader();
    </script>
<!-- ===== END HEAD001 ===== -->
