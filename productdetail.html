/* ==========================================
   CORE DESIGN SYSTEM & DETAIL LAYOUT
   ========================================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Kanit", Arial, sans-serif;
}

body {
  background: #ffffff;
  color: #1a1a1a;
  overflow-x: hidden;

  -webkit-font-smoothing: antialiased;
  padding-top: 70px; /* ป้องกันเนื้อหาโดน Topbar บดบัง */
}

.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 20px 16px 80px;
}

/* =========================
   BREADCRUMB
========================= */
.breadcrumb {
  font-size: 12px;
  color: #888;
  margin-bottom: 24px;
  letter-spacing: 1px;
}

.breadcrumb a {
  color: #888;
  text-decoration: none;
}

.breadcrumb a:hover {
  text-decoration: underline;
  color: #2f5ea8;
}

/* =========================
   MAIN PRODUCT GRID (TOP ZONE)
========================= */
.main-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  margin-bottom: 40px;
}

/* IMAGE SYSTEM */
.image-gallery {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.main-img-wrap {
  width: 100%;
  aspect-ratio: 1/1;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid #eee;
  background: #fdfdfd;
}

.main-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.thumb-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
}

.thumb-box {
  width: 64px;
  height: 64px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid #eee;
  cursor: pointer;
  flex-shrink: 0;
  background: #fff;
}

.thumb-box.active {
  border-color: #2f5ea8;
}

.thumb-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* INFO ZONE */
.info-zone {
  display: flex;
  flex-direction: column;
  align-items: flex-start; 
  width: 100%;
}

.category-tag {
  font-size: 11px;
  color: #888;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}

.product-name {
  font-size: 24px; /* ปรับขนาดให้ใหญ่เรียบหรูดูแพงในเดสก์ท็อป */
  font-weight: 500;
  line-height: 1.4;
  margin-bottom: 16px;
  color: #111;
  text-align: left;
}

/* SPEC TABLE (รหัสสินค้า, แบรนด์, รุ่น, หมวดหมู่) */

  max-width: 380px;

  margin-bottom: 20px;
}

.meta-table td {
  padding: 6px 0;
  font-size: 13px;
  border-bottom: 1px dashed #eee;
}

.meta-table td.lbl {
  color: #777;
  width: 90px;
}

.meta-table td.val {
  color: #111;
  font-weight: 500;
}

/* PRICE BOX */
.price-box {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-bottom: 20px;
  background: #fafafa;
  padding: 10px 14px;
  border-radius: 12px;

.price-old {

.qty-label {

.qty-btn {

.btn-back-trigger {

/* =========================

.modal-overlay {

/* STATUS CONTAINER */

<body>

<div id="header-placeholder"></div>

<main class="container" id="main-content">
  <div class="status-container">
    <div class="loading-text">กำลังเรียกดูข้อมูลสินค้า...</div>

<div id="footer-placeholder"></div>

<script>
// ====================================================================
// ANTI-OVERWRITE ENGINE FOR CORE LAYOUT (ระบบล็อคตำแหน่งสกัดกั้นการเขียนทับ)
// ====================================================================
window.addEventListener("load", function() {
    let layoutCache = { header: '', footer: '' };

    function secureInject(targetId, filepath, cacheKey) {
        const targetNode = document.getElementById(targetId);
        if (!targetNode) return;

        fetch(filepath)
            .then(res => {
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.text();
            })
            .then(html => {
                if (html) {
                    layoutCache[cacheKey] = html;
                    targetNode.innerHTML = html;
                    console.log(`[Secure Layout]: ${targetId} injected.`);

                    // เปิดระบบเฝ้าระวังการโดนสคริปต์ตัวอื่นเข้ามาล้างเนื้อหาของช่องพักนี้
                    const observer = new MutationObserver(function(mutations) {
                        if (targetNode.innerHTML !== layoutCache[cacheKey]) {
                            observer.disconnect();
                            console.warn(`[Anti-Overwrite]: ตรวจพบการพยายามลบ/เขียนทับข้อมูลพื้นที่ ${targetId}! ระบบทำการฉีดกลับคืนเรียบร้อย...`);
                            targetNode.innerHTML = layoutCache[cacheKey];
                            observer.observe(targetNode, { childList: true, subtree: true, characterData: true });
                            if (cacheKey === 'header') initMenuController();
                        }
                    });
                    observer.observe(targetNode, { childList: true, subtree: true, characterData: true });
                    if (cacheKey === 'header') initMenuController();
                }
            })
            .catch(err => console.error(`[Secure Layout Error]: Cannot load ${filepath}`, err));
    }

    // สั่งรันชุดผู้พิทักษ์โครงสร้างอาคารแบบแยกเป็นลำดับสุดท้ายของหน้า
    secureInject('header-placeholder', '/header.html', 'header');
    secureInject('footer-placeholder', '/footer.html', 'footer');

    // จัดการเมนูของ Header เมื่อโครงสร้างพร้อมใช้งาน
    function initMenuController() {
        document.removeEventListener('click', menuClickHandler);
        document.addEventListener('click', menuClickHandler);
    }

    function menuClickHandler(e) {
        const menuBtn = e.target.closest('#menuBtn');
        const menuDropdown = document.getElementById("menuDropdown");
        if (menuBtn && menuDropdown) {
            e.preventDefault();
            e.stopPropagation();
            menuDropdown.classList.toggle("active");
        } else if (menuDropdown && !menuDropdown.contains(e.target)) {
            menuDropdown.classList.remove("active");
        }
    }

    // ระบบ Scroll To Top Controller
    const scrollTopBtn = document.getElementById("scrollTopBtn");
    if (scrollTopBtn) {
        window.addEventListener("scroll", function() {
            if (window.pageYOffset > 400) {
                scrollTopBtn.classList.add("visible");
            } else {
                scrollTopBtn.classList.remove("visible");
            }
        });
        scrollTopBtn.addEventListener("click", function() {
            window.scrollTo({ top: 0, behavior: "smooth" });
        });
    }
});
</script>

<script>
const API = "https://script.google.com/macros/s/AKfycby0BIQMiM7mEoQrckKXXSYZAudz3sJDsEr87IT8hktGk8oXc4wqC4bbV8LusoVXufXKvQ/exec";
let currentProductData = null;

// ฟังก์ชันล้างฟอร์แมตตัวคั่นคอมมาเพื่อการคำนวณราคาแบบพลวัต
function cleanNumber(val) {
  if (val === null || val === undefined) return 0;
  if (typeof val === 'number') return val;
  let str = String(val).replace(/,/g, '').trim();
  if (str === "" || str === "-") return 0;
  let parsed = parseFloat(str);
  return isNaN(parsed) ? 0 : parsed;
}

// ฟังก์ชันจัดฟอร์แมตตัวเลขคั่นคอมมาทุกๆ หลักพันสำหรับราคาต่อหน่วยและราคารวม
function formatMoney(val) {
  let num = cleanNumber(val);
  return num > 0 ? num.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 2}) : '-';
}

async function loadProductDetail() {
  const mainContent = document.getElementById("main-content");
  
  try {
    const urlParams = new URLSearchParams(window.location.search);
    const productCode = urlParams.get('code');
    
    if (!productCode) {
      showError("ไม่พบรหัสสินค้าในลิงก์การเชื่อมต่อ");
      return;
    }
    
    const res = await fetch(API, { method: "GET", mode: "cors", redirect: "follow" });
    const jsonResult = await res.json();
    
    if (jsonResult.status !== "success") throw new Error(jsonResult.message);
    
    const product = jsonResult.data.find(p => String(p.Item_Code || "").trim() === String(productCode).trim());
    
    if (!product) {
      showError(`ไม่พบฐานข้อมูลของรหัสสินค้า: ${productCode}`);
      return;
    }

    currentProductData = product;

    // อัปเดตเมตาแท็กเพื่อสนับสนุน SEO และ Open Graph ระบบจัดการสินค้า
    const pageTitle = `UNIMERCE | ${product.Description || 'Product Detail'}`;
    document.title = pageTitle;
    document.getElementById("meta-title").innerText = pageTitle;
    document.getElementById("og-title").setAttribute("content", pageTitle);
    
    if(product.Productdetail) {
      document.getElementById("meta-desc").setAttribute("content", product.Productdetail.substring(0, 150));
      document.getElementById("og-desc").setAttribute("content", product.Productdetail.substring(0, 150));
    }
    if(product.image_link01) {
      document.getElementById("og-image").setAttribute("content", product.image_link01.trim());
    }

    // ประกอบอาเรย์ลิ้งก์รูปภาพของตัวสินค้า
    const images = [];
    if(product.image_link01) images.push(product.image_link01.trim());
    if(product.ImageLink02) images.push(product.ImageLink02.trim());
    if(product.ImageLink03) images.push(product.ImageLink03.trim());
    if(images.length === 0) images.push('https://via.placeholder.com/600x600?text=No+Image');

    // จัดเตรียมรูปแบบราคาสนับสนุนคอมมาคั่นหลักพัน
    const listPriceFormatted = product.ListPrice ? formatMoney(product.ListPrice) : '';
    const promoPriceFormatted = product.PromotionPrice ? formatMoney(product.PromotionPrice) : '-';

    // เรนเดอร์หน้าจอโครงสร้างข้อมูลทั้งหมด (ตัด Overview, Features, Tech Specifications ออกตามบรีฟ)
    mainContent.innerHTML = `
      <div class="breadcrumb">
        <a href="/">HOME</a> / <a href="/products">PRODUCTS</a> / ${product.Item_Code}
      </div>
      
      <div class="main-grid">
        <div class="image-gallery">
          <div class="main-img-wrap">
            <img id="view-main-img" src="${images[0]}" onerror="this.src='https://via.placeholder.com/600x600?text=No+Image'" />
          </div>
          ${images.length > 1 ? `
            <div class="thumb-row">
              ${images.map((img, idx) => `
                <div class="thumb-box ${idx === 0 ? 'active' : ''}" onclick="switchThumb(this, '${img}')">
                  <img src="${img}" onerror="this.src='https://via.placeholder.com/100x100?text=No+Img'" />
                </div>
              `).join('')}
            </div>
          ` : ''}
        </div>
        
        <div class="info-zone">
          <div class="category-tag">${product.MainCategory || '-'}</div>
          <h1 class="product-name">${product.Description || '-'}</h1>
          
          <table class="meta-table">
            <tr>
              <td class="lbl">รหัสสินค้า</td>
              <td class="val">${product.Item_Code || '-'}</td>
            </tr>
            <tr>
              <td class="lbl">แบรนด์</td>
              <td class="val">${product.INDEX2_BRAND || '-'}</td>
            </tr>
            <tr>
              <td class="lbl">รุ่น</td>
              <td class="val">${product.INDEX3_SERIES || '-'}</td>
            </tr>
            <tr>
              <td class="lbl">หมวดหมู่</td>
              <td class="val">${product.MainCategory || '-'}</td>
            </tr>
          </table>
          
          <div class="price-box">
            ${listPriceFormatted ? `<div class="price-old">฿${listPriceFormatted}</div>` : ''}
            <div class="price-new">฿${promoPriceFormatted}</div>
          </div>
          
          <div class="qty-row">
            <div class="qty-label">จำนวนสั่งซื้อ:</div>
            <div class="qty-control">
              <button class="qty-btn" onclick="updateQty(-1)">-</button>
              <input type="number" id="order-qty" class="qty-input" value="1" min="1" readonly />
              <button class="qty-btn" onclick="updateQty(1)">+</button>
            </div>
          </div>
          
          <div class="btn-group">
            <button class="btn-primary" onclick="openOrderModal()">สั่งซื้อสินค้านี้</button>
            <a href="/products" class="btn-back-trigger">Back to All Products</a>
          </div>
        </div>
      </div>
      
      <div class="detail-sections">
        ${product.Productdetail ? `
        <div class="sec-block">
          <h2>Product Detail</h2>
          <div class="body-text">${product.Productdetail}</div>
        </div>
        ` : `<div class="sec-block"><h2>Product Detail</h2><div class="body-text">-</div></div>`}
      </div>

      <div class="contact-footer-bar">
        <div class="contact-footer-title">General Inquiries & Support</div>
        <button class="btn-copy-contact-mail" onclick="copyTextDirect('contact@unimercegroup.com', 'คัดลอกอีเมลติดต่อทั่วไปเรียบร้อยแล้ว!')">
          contact@unimercegroup.com &nbsp;📋
        </button>
        <div id="toast-bottom-mail" style="font-size:12px; color:#2f5ea8; margin-top:8px; min-height:16px;"></div>
      </div>

      <div class="modal-overlay" id="order-modal">
        <div class="modal-box">
          <div class="modal-header">
            <div class="modal-title">ขั้นตอนการสั่งซื้อและชำระเงิน</div>
            <button class="modal-close" onclick="closeOrderModal()">×</button>
          </div>
          
          <div class="email-row-info">
            <span>ส่งหา: <strong>sales@unimercegroup.com</strong></span>
            <button class="btn-inline-copy" onclick="copyTextDirect('sales@unimercegroup.com', 'คัดลอกอีเมลฝ่ายขายเรียบร้อย!')">คัดลอกเมล</button>
          </div>

          <div class="copy-area-header-flex">
            <span><strong>ขั้นตอนที่ 1:</strong> รายละเอียดสินค้าที่ต้องใช้สั่งซื้อ</span>
            <button class="btn-inline-copy" onclick="copyTextDirect(document.getElementById('copy-text-target').innerText, 'คัดลอกรายละเอียดสินค้าเรียบร้อย!')">คัดลอก</button>
          </div>
          <div class="copy-area" id="copy-text-target"></div>
          
          <p class="modal-instruction-text" style="margin-top:4px;">
            <strong>ขั้นตอนที่ 2:</strong> สามารถชำระเงินและแนบหลักฐาน พร้อมส่งอีเมลมาได้เลยครับ
          </p>
          
          <div class="bank-payment-box">
            <div class="bank-title">ธนาคารกสิกรไทย (บัญชีบริษัท)</div>
            <div class="bank-detail-flex">
              <div>
                <strong>บจก. ยูนิเมิร์ซ</strong><br>
                <span style="font-family:monospace; font-size:14.5px; letter-spacing:0.5px; font-weight:600;">232-1-70687-0</span>
              </div>
              <button class="btn-inline-copy kbank-btn-copy" onclick="copyTextDirect('2321706870', 'คัดลอกเลขบัญชี 2321706870 เรียบร้อย!')">คัดลอกเลขบัญชี</button>
            </div>
          </div>

          <button class="btn-primary" style="width:100%; border-radius:10px;" onclick="copyOrderTextToClipboard()">
            คัดลอกรายละเอียดทั้งหมด & เปิดหน้าต่างอีเมล
          </button>
          
          <div class="toast-msg" id="toast-success"></div>
        </div>
      </div>
    `;
    
  } catch (error) {
    showError("ไม่สามารถเรียกดูชุดข้อมูลสินค้าจากระบบเซิร์ฟเวอร์ได้");
  }
}

window.switchThumb = function(element, imgSrc) {
  document.getElementById("view-main-img").src = imgSrc;
  document.querySelectorAll('.thumb-box').forEach(box => box.classList.remove('active'));
  element.classList.add('active');
}

window.updateQty = function(amount) {
  const input = document.getElementById("order-qty");
  let current = parseInt(input.value) || 1;
  current += amount;
  if(current < 1) current = 1;
  input.value = current;
}

window.openOrderModal = function() {
  if(!currentProductData) return;
  const qty = document.getElementById("order-qty").value;
  
  // แปลงราคาและใส่เครื่องหมายคอมมาแยกหลักพันสำหรับแสดงผลในข้อมูลจัดส่ง
  const basePrice = currentProductData.PromotionPrice || currentProductData.ListPrice || '0';
  const priceUnitFormatted = formatMoney(basePrice);
  const totalPriceFormatted = formatMoney(cleanNumber(basePrice) * qty);
  
  const textTemplate = `เรียน ฝ่ายขาย UNIMERCE GROUP,\n\nฉันมีความประสงค์ต้องการสั่งซื้อสินค้าชิ้นนี้ตามรายละเอียดดังต่อไปนี้:\n-----------------------------------------\nรหัสสินค้า (Item Code): ${currentProductData.Item_Code || '-'}\nชื่อสินค้า (Description): ${currentProductData.Description || '-'}\nแบรนด์ (Brand): ${currentProductData.INDEX2_BRAND || '-'}\nรุ่น (Series): ${currentProductData.INDEX3_SERIES || '-'}\nหมวดหมู่ (Category): ${currentProductData.MainCategory || '-'}\nจำนวนที่ต้องการ: ${qty} ${currentProductData.UOM || 'หน่วย'}\nราคาต่อหน่วย: ฿${priceUnitFormatted}\nราคารวมทั้งสิ้น: ฿${totalPriceFormatted}\n-----------------------------------------\n[แนบหลักฐานการชำระเงินโอนเข้าบัญชี บจก. ยูนิเมิร์ซ]\n\nกรุณาตรวจสอบและจัดส่งตามที่อยู่นี้...\nชื่อผู้รับ:\nเบอร์โทรศัพท์:\nที่อยู่จัดส่ง:`;
  
  document.getElementById("copy-text-target").innerText = textTemplate;
  document.getElementById("order-modal").classList.add("active");
}

window.closeOrderModal = function() {
  document.getElementById("order-modal").classList.remove("active");
  document.getElementById("toast-success").innerText = "";
}

// ฟังก์ชันศูนย์กลางในการประมวลผลการคัดลอกค่าลงคลิปบอร์ดของตัวเครื่องอย่างแม่นยำ
window.copyTextDirect = function(textToCopy, customMessage) {
  navigator.clipboard.writeText(textToCopy).then(() => {
    // ตรวจจับจุดพ่นข้อความตอบกลับแจ้งผู้ใช้งาน
    const toastModal = document.getElementById("toast-success");
    const toastBottom = document.getElementById("toast-bottom-mail");
    
    if (toastModal && document.getElementById("order-modal").classList.contains("active")) {
      toastModal.innerText = customMessage;
      setTimeout(() => { toastModal.innerText = ""; }, 2500);
    } else if (toastBottom) {
      toastBottom.innerText = customMessage;
      setTimeout(() => { toastBottom.innerText = ""; }, 2500);
    }
  });
}

// ฟังก์ชันคัดลอกข้อความรายละเอียดและจัดสั่งยิงโครงสร้าง mailto ลิงก์
window.copyOrderTextToClipboard = function() {
  const text = document.getElementById("copy-text-target").innerText;
  const qty = document.getElementById("order-qty").value;
  
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById("toast-success");
    toast.innerText = "✓ คัดลอกรายละเอียดสินค้าแล้ว กำลังนำทางไปแอปพลิเคชันอีเมล...";
    
    setTimeout(() => {
      const subject = encodeURIComponent(`สั่งซื้อสินค้า รหัส ${currentProductData.Item_Code} จำนวน ${qty} ชิ้น`);
      const body = encodeURIComponent(text);
      window.location.href = `mailto:sales@unimercegroup.com?subject=${subject}&body=${body}`;
    }, 1200);
  });
}

function showError(message) {
  document.getElementById("main-content").innerHTML = `
    <div class="status-container">
      <div class="error-text">${message}</div>
      <a href="/products" class="back-btn">กลับสู่หน้าสินค้าทั้งหมด</a>
    </div>
  `;
}

window.addEventListener("load", loadProductDetail);
</script>
</body>
</html>
