<!-- =========================
 UNIMERCE UERP Shared Header
 Version 2.0
 Analytics Architecture
========================= -->


<!-- =========================
 Top Header
========================= -->

<header class="bg-white border-b border-google-border shadow-sm">

    <div class="max-w-[1000px] mx-auto px-4 h-16 flex items-center justify-between">


        <!-- Logo / System -->
        <div class="flex items-center gap-3">

            <div class="
                w-10 h-10 
                rounded-xl 
                bg-google-blue 
                text-white 
                flex items-center justify-center
                shadow-sm
            ">
                <i class="fa-solid fa-layer-group"></i>
            </div>


            <div>

                <div class="
                    text-sm 
                    font-bold 
                    text-slate-800
                    tracking-tight
                ">
                    UNIMERCE UERP
                </div>


                <div class="
                    text-[11px]
                    text-google-gray
                ">
                    Business Intelligence Platform
                </div>

            </div>

        </div>



        <!-- Future User Menu -->

        <div class="
            flex 
            items-center 
            gap-5
            text-google-gray
        ">


            <button 
                class="
                    hover:text-google-blue 
                    transition
                    text-base
                "
                title="Notification"
            >
                <i class="fa-regular fa-bell"></i>
            </button>



            <button
                class="
                    hover:text-google-blue 
                    transition
                    text-base
                "
                title="User"
            >
                <i class="fa-regular fa-circle-user"></i>
            </button>


        </div>


    </div>

</header>
