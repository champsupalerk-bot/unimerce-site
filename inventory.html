/* =========================
   BASE (กลับมาใช้ Font และการตั้งค่าเดิมทั้งหมด)
========================= */
body{

/* =========================
   LAYOUT
========================= */
.container{

}

/* =========================
   BREADCRUMB ROW
========================= */
.breadcrumb-row{
  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:12px;
}

.breadcrumb{

}

.breadcrumb a{
  color: #777;
  text-decoration: none;
  font-weight: bold;
}

.breadcrumb a:hover{
  text-decoration: underline;
  color: #2f5ea8;
}

/* Checkbox วงกลม */
.hide-zero-wrap, .category-label{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  color:#777;
  white-space:nowrap;
  cursor:pointer;
  user-select:none;
}

.hide-zero-wrap input[type="checkbox"],
.category-label input[type="checkbox"]{
  appearance: none;
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border: 1px solid #ddd;
  border-radius: 50%; 
  outline: none;
  background: #fff;
  cursor: pointer;
  display: grid;
  place-content: center;
  transition: all 0.2s ease; 
}

.hide-zero-wrap input[type="checkbox"]::before,
.category-label input[type="checkbox"]::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 50%;
  transform: scale(0);
  transition: 0.1s transform ease-in-out;
  background-color: #fff;
}

.hide-zero-wrap:hover input[type="checkbox"],
.category-label:hover input[type="checkbox"] {
  border-color: #2f5ea8;
  box-shadow: 0 0 0 4px rgba(47, 94, 168, 0.15);
}

.hide-zero-wrap input[type="checkbox"]:checked,
.category-label input[type="checkbox"]:checked{
  background:#2f5ea8;
  border-color:#2f5ea8;
}

.hide-zero-wrap input[type="checkbox"]:checked::before,
.category-label input[type="checkbox"]:checked::before {
  transform: scale(1);
}

/* =========================
   CATEGORY FILTER BAR
========================= */
.category-filter-bar {

/* =========================

========================= */

.dropdown-bar-wrap {

/* =========================

/* ซ่อนกล่องแปลงภาพดิบ ไม่ให้พนักงานเห็นรอยต่อตอนสลับร่าง */

<script>

/* =========================
   LOAD HEADER
========================= */
fetch("header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header-placeholder").innerHTML = data;
  });

let rawData      = [];
let filteredData = [];
let viewData     = [];

let sortState = {
  key: null,
  dir: "asc"
};

function cleanNumber(val) {
  if (val === null || val === undefined) return 0;
  if (typeof val === 'number') return val;
  let str = String(val).replace(/,/g, '').trim();
  if (str === "" || str === "-") return 0;
  let parsed = parseFloat(str);
  return isNaN(parsed) ? 0 : parsed;
}

/* =========================
   LOAD DATA
========================= */
async function loadTable(){
  try {
    rawData = await window.supabaseFetch('products');
    applyAll();
  } catch(e) {
    console.error("Supabase Connection Error:", e);
    document.getElementById("table-body").innerHTML =
      '<tr><td colspan="3" style="text-align:center; padding:20px;">Failed to load secure assets.</td></tr>';
  }
}

/* =========================
   APPLY ALL
========================= */
function applyAll(){
  const q        = document.getElementById("searchBox").value.toLowerCase().trim();
  const hideZero = document.getElementById("hideZero").checked;
  const currentCol3 = document.getElementById("column3Select").value;

  const checkedCategories = Array.from(document.querySelectorAll('.cat-checkbox:checked')).map(cb => cb.value);

  let result = rawData;

  if (checkedCategories.length > 0) {
    result = result.filter(i => {
      const cat = String(i.MainCategory || "").trim();
      return checkedCategories.includes(cat);
    });
  }

  if(q){
    result = result.filter(i =>
      String(i.Item_Code   || "").toLowerCase().includes(q) ||
      String(i.Description || "").toLowerCase().includes(q) ||
      String(i[currentCol3]  || "").toLowerCase().includes(q)
    );
  }

  if(hideZero){
    result = result.filter(i => {
      const rawVal = i.OnHand;
      if(rawVal === undefined || rawVal === null) return false;
      const vStr = String(rawVal).trim();
      if(vStr === "" || vStr === "-") return false;
      
      const n = cleanNumber(rawVal);
      if(n === 0) return false;
      return true;
    });
  }

  filteredData = result;

  if(sortState.key){
    applySortOnFiltered();
  } else {
    viewData = filteredData;
    renderTable(viewData);
  }
}

/* =========================
   SORT
========================= */
function sortTable(key){
  if(sortState.key === key){
    sortState.dir = sortState.dir === "asc" ? "desc" : "asc";
  } else {
    sortState.key = key;
    sortState.dir = "asc";
  }
  applySortOnFiltered();
}

function applySortOnFiltered(){
  const key = sortState.key;
  const dir = sortState.dir;

  viewData = [...filteredData].sort((a, b) => {
    let v1 = a[key] ?? "";
    let v2 = b[key] ?? "";

    if(key === 'OnHand' || key === 'ListPrice' || key === 'PromotionPrice' || key === 'ราคาต่อลัง' || key === 'จำนวนต่อลัง') {
       let n1 = cleanNumber(v1);
       let n2 = cleanNumber(v2);
       return dir === "asc" ? n1 - n2 : n2 - n1;
    }

    const n1 = parseFloat(v1);
    const n2 = parseFloat(v2);
    if(!isNaN(n1) && !isNaN(n2)){
      return dir === "asc" ? n1 - n2 : n2 - n1;
    }

    v1 = String(v1).toLowerCase();
    v2 = String(v2).toLowerCase();

    if(v1 < v2) return dir === "asc" ? -1 : 1;
    if(v1 > v2) return dir === "asc" ?  1 : -1;
    return 0;
  });

  updateArrows(key, dir);
  renderTable(viewData);
}

/* =========================
   RENDER TABLE
========================= */
function renderTable(data){
  const tbody = document.getElementById("table-body");
  const currentCol3 = document.getElementById("column3Select").value;

  if(!data || data.length === 0){
    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#aaa;padding:20px;">No results found.</td></tr>';
    return;
  }

  tbody.innerHTML = data.map(p => {
    let cellValue = p[currentCol3] !== undefined && p[currentCol3] !== null ? p[currentCol3] : "-";
    let cellClass = "col-stock";
    
    if(currentCol3 === "ReorderSTATUS" && String(cellValue).trim() === "ORDER!") {
      cellClass += " order-alert";
    }

    if((currentCol3 === "OnHand" || currentCol3 === "PromotionPrice" || currentCol3 === "จำนวนต่อลัง") && cellValue !== "-") {
       let num = cleanNumber(cellValue);
       cellValue = num.toLocaleString();
    }

    // เคลียร์อักขระพิเศษเพื่อไม่ให้ String หลุดสคริปต์
    const safeItemCode = String(p.Item_Code || "-").replace(/'/g, "\\'").replace(/"/g, "&quot;");
    const safeDesc = String(p.Description || "-").replace(/'/g, "\\'").replace(/"/g, "&quot;");
    const safeLocation = String(p.Location || "").replace(/'/g, "\\'").replace(/"/g, "&quot;");

    return `
      <tr onclick="copyRowText(this, event)">
        <td class="col-code">
          <span>${p.Item_Code || "-"}</span>
          <button class="btn-barcode-trigger" onclick="openBarcodeGenModal('${safeDesc}', '${safeItemCode}', '${safeLocation}', event)" title="Generate Barcode">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;">
              <line x1="6" y1="7" x2="6" y2="17" stroke-width="2.5" />
              <line x1="9.5" y1="7" x2="9.5" y2="17" stroke-width="1" />
              <line x1="12" y1="7" x2="12" y2="17" stroke-width="2" />
              <line x1="14.5" y1="7" x2="14.5" y2="17" stroke-width="1" />
              <line x1="18" y1="7" x2="18" y2="17" stroke-width="3" />
              <path d="M 2,7 V 2 H 7" stroke-width="1.5" />
              <path d="M 17,2 H 22 V 7" stroke-width="1.5" />
              <path d="M 2,17 V 22 H 7" stroke-width="1.5" />
              <path d="M 17,22 H 22 V 17" stroke-width="1.5" />
            </svg>
          </button>
        </td>
        <td class="col-desc">${p.Description || "-"}</td>
        <td class="${cellClass}">${cellValue}</td>
      </tr>
    `;
  }).join("");
}

/* =========================
   COPY FUNCTION
========================= */
function copyRowText(rowElement, event) {
  // ดักจับเพิ่มเติมว่าหากคลิกโดนปุ่มบาร์โค้ด หรือปุ่มดาวน์โหลดรูปภาพ ไม่ต้องทำงาน
  if (event.target.closest('.btn-barcode-trigger') || event.target.closest('.btn-download-trigger')) {
    return;
  }

  const tds = rowElement.getElementsByTagName("td");
  let text = "";
  for(let i = 0; i < tds.length; i++) {
     let tempTd = tds[i].cloneNode(true);
     const btn = tempTd.querySelector('.btn-barcode-trigger');
     if(btn) btn.remove();
     text += tempTd.innerText.trim() + (i === tds.length - 1 ? "" : " ");
  }
  
  navigator.clipboard.writeText(text).then(() => {
     const toast = document.getElementById("toast");
     toast.style.display = "block";
     setTimeout(() => { toast.style.display = "none"; }, 1500);
  });
}

/* ฟังก์ชันควบคุมป็อปอัพบาร์โค้ดเดิมถูกตัดออกเนื่องจากย้ายไปจัดการในไฟล์ barcode-label-engine.js ทั้งหมดแล้ว */

/* =========================
   ARROWS UPDATE & DYNAMIC SELECT HEADER TEXT
========================= */
function updateArrows(active, dir){
  const currentCol3 = document.getElementById("column3Select").value;
  const selectElement = document.getElementById("column3Select");
  const selectedText = selectElement.options[selectElement.selectedIndex].text;
  
  document.getElementById("col3HeaderName").textContent = selectedText === "OnHand" ? "OH" : selectedText;

  ["Item_Code", "Description"].forEach(k => {
    const el = document.getElementById("arrow-" + k);
    if(el) el.textContent = k === active ? (dir === "asc" ? "↑" : "↓") : "↕";
  });

  const el3 = document.getElementById("arrow-Col3");
  if(el3) el3.textContent = currentCol3 === active ? (dir === "asc" ? "↑" : "↓") : "↕";
}

/* =========================
   INIT EVENTS
========================= */
window.addEventListener("load", () => {

  document.getElementById("searchBox").addEventListener("input", () => {
    applyAll();
  });

  document.getElementById("hideZero").addEventListener("change", () => {
    applyAll();
  });

  document.getElementById("column3Select").addEventListener("change", (e) => {
    sortState.key = e.target.value;
    applyAll();
  });

  document.querySelectorAll('.cat-checkbox').forEach(cb => {
    cb.addEventListener("change", () => {
      applyAll();
    });
  });

  loadTable();
});

/* =========================
   HAMBURGER MENU
========================= */
setTimeout(() => {
  const menuBtn = document.getElementById("menuBtn");
  const menuDropdown = document.getElementById("menuDropdown");

  if(menuBtn && menuDropdown){
    menuBtn.addEventListener("click", () => {
      menuDropdown.classList.toggle("active");
    });
  }
}, 100);

</script>
</body>
</html>
